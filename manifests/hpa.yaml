# HPA: holds average CPU across obs-sim pods at 70% of the request (50m),
# scaling between 2 and 6 replicas. Requires metrics-server (bundled
# with k3s). Utilization is relative to resources.requests.cpu.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: obs-sim
  namespace: obs-sim
spec:
  scaleTargetRef:            # which object's replica count to manage
    apiVersion: apps/v1
    kind: Deployment
    name: obs-sim
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70