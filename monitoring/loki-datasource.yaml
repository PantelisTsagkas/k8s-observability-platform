# Registers Loki as a Grafana datasource, the declarative way.
#
# kube-prometheus-stack's Grafana runs a "sidecar" container that watches
# for ConfigMaps labelled `grafana_datasource: "1"` and provisions whatever
# datasource YAML they contain, live, no Grafana restart. That is why we
# ship this as a labelled ConfigMap instead of clicking through the UI:
# it is reproducible and it is what GitOps (Phase 2) will manage.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"          # the magic label the sidecar looks for
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy                # Grafana's backend proxies queries to Loki
        url: http://loki-gateway.monitoring.svc.cluster.local
        isDefault: false             # Prometheus stays the default datasource
